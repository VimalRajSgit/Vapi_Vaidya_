<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vaidya — AI Health Assistant</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Tiro+Kannada&family=DM+Sans:wght@300;400;500&display=swap");

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0d0f0e;
                --surface: #151917;
                --surface2: #1c2020;
                --border: rgba(255, 255, 255, 0.08);
                --text: #e8ede9;
                --muted: #7a8a7d;
                --accent: #2ec97a;
                --accent-dim: rgba(46, 201, 122, 0.12);
                --accent-glow: rgba(46, 201, 122, 0.3);
                --danger: #e85c5c;
                --user-bubble: #1e2c22;
                --ai-bubble: #1a1d1b;
            }

            body {
                font-family: "DM Sans", sans-serif;
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            header {
                padding: 16px 24px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
            }

            .logo {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: var(--accent-dim);
                border: 1px solid var(--accent-glow);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .logo-icon svg {
                width: 18px;
                height: 18px;
                fill: var(--accent);
            }

            .logo-name {
                font-family: "Tiro Kannada", serif;
                font-size: 22px;
                color: var(--text);
                letter-spacing: 0.02em;
            }

            .logo-sub {
                font-size: 11px;
                color: var(--muted);
                margin-top: 1px;
            }

            .config-btn {
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--muted);
                padding: 6px 14px;
                border-radius: 8px;
                font-size: 13px;
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                transition:
                    color 0.2s,
                    border-color 0.2s;
            }
            .config-btn:hover {
                color: var(--text);
                border-color: rgba(255, 255, 255, 0.2);
            }

            .chat-area {
                flex: 1;
                overflow-y: auto;
                padding: 24px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                scroll-behavior: smooth;
            }

            .chat-area::-webkit-scrollbar {
                width: 4px;
            }
            .chat-area::-webkit-scrollbar-track {
                background: transparent;
            }
            .chat-area::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 4px;
            }

            .msg {
                display: flex;
                gap: 10px;
                max-width: 720px;
                animation: fadeUp 0.25s ease;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .msg.user {
                align-self: flex-end;
                flex-direction: row-reverse;
            }
            .msg.assistant {
                align-self: flex-start;
            }

            .avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                font-weight: 500;
            }

            .avatar.ai {
                background: var(--accent-dim);
                border: 1px solid var(--accent-glow);
                color: var(--accent);
            }
            .avatar.user-av {
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--muted);
            }

            .bubble {
                padding: 12px 16px;
                border-radius: 14px;
                font-size: 15px;
                line-height: 1.65;
                max-width: 560px;
            }

            .msg.user .bubble {
                background: var(--user-bubble);
                border: 1px solid rgba(46, 201, 122, 0.15);
                border-radius: 14px 4px 14px 14px;
                color: var(--text);
            }

            .msg.assistant .bubble {
                background: var(--ai-bubble);
                border: 1px solid var(--border);
                border-radius: 4px 14px 14px 14px;
                color: var(--text);
            }

            .typing-dots {
                display: flex;
                gap: 5px;
                align-items: center;
                padding: 4px 0;
            }
            .typing-dots span {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--muted);
                animation: dot 1.2s infinite;
            }
            .typing-dots span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-dots span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes dot {
                0%,
                80%,
                100% {
                    opacity: 0.3;
                    transform: scale(0.8);
                }
                40% {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            .bottom {
                padding: 16px 24px 20px;
                border-top: 1px solid var(--border);
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .input-row {
                display: flex;
                gap: 10px;
                align-items: flex-end;
            }

            textarea {
                flex: 1;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                color: var(--text);
                font-family: "DM Sans", sans-serif;
                font-size: 15px;
                padding: 12px 16px;
                resize: none;
                max-height: 120px;
                line-height: 1.5;
                outline: none;
                transition: border-color 0.2s;
            }
            textarea:focus {
                border-color: var(--accent-glow);
            }
            textarea::placeholder {
                color: var(--muted);
            }

            .action-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                border: none;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    transform 0.15s,
                    background 0.2s;
                flex-shrink: 0;
            }
            .action-btn:active {
                transform: scale(0.93);
            }

            .send-btn {
                background: var(--accent);
            }
            .send-btn svg {
                fill: #0d0f0e;
                width: 18px;
                height: 18px;
            }
            .send-btn:disabled {
                background: var(--surface2);
                cursor: not-allowed;
            }
            .send-btn:disabled svg {
                fill: var(--muted);
            }

            .mic-btn {
                background: var(--surface2);
                border: 1px solid var(--border);
                position: relative;
            }
            .mic-btn svg {
                fill: var(--muted);
                width: 18px;
                height: 18px;
                transition: fill 0.2s;
            }
            .mic-btn:hover svg {
                fill: var(--text);
            }
            .mic-btn.recording {
                background: rgba(232, 92, 92, 0.15);
                border-color: var(--danger);
                animation: pulse 1s infinite;
            }
            .mic-btn.recording svg {
                fill: var(--danger);
            }

            @keyframes pulse {
                0%,
                100% {
                    box-shadow: 0 0 0 0 rgba(232, 92, 92, 0.3);
                }
                50% {
                    box-shadow: 0 0 0 8px rgba(232, 92, 92, 0);
                }
            }

            .status-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 12px;
                color: var(--muted);
            }

            .status-indicator {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .status-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--muted);
            }
            .status-dot.connected {
                background: var(--accent);
            }
            .status-dot.error {
                background: var(--danger);
            }

            .tts-toggle {
                display: flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
            }
            .tts-toggle input {
                accent-color: var(--accent);
                cursor: pointer;
            }

            /* Config modal */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.7);
                z-index: 100;
                align-items: center;
                justify-content: center;
            }
            .modal-overlay.open {
                display: flex;
            }

            .modal {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 28px;
                width: 440px;
                max-width: 90vw;
            }

            .modal h2 {
                font-size: 18px;
                font-weight: 500;
                margin-bottom: 20px;
            }

            .field {
                margin-bottom: 16px;
            }
            .field label {
                display: block;
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 6px;
            }
            .field input,
            .field select {
                width: 100%;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 8px;
                color: var(--text);
                font-family: "DM Sans", sans-serif;
                font-size: 14px;
                padding: 9px 12px;
                outline: none;
            }
            .field input:focus {
                border-color: var(--accent-glow);
            }

            .modal-btns {
                display: flex;
                gap: 10px;
                margin-top: 20px;
                justify-content: flex-end;
            }

            .btn-save {
                background: var(--accent);
                color: #0d0f0e;
                border: none;
                border-radius: 8px;
                padding: 9px 20px;
                font-family: "DM Sans", sans-serif;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
            }

            .btn-cancel {
                background: var(--surface2);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 9px 20px;
                font-family: "DM Sans", sans-serif;
                font-size: 14px;
                cursor: pointer;
            }

            .welcome {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                flex: 1;
                gap: 12px;
                text-align: center;
                color: var(--muted);
                padding: 40px;
            }
            .welcome-icon {
                font-size: 40px;
                margin-bottom: 4px;
            }
            .welcome h2 {
                font-size: 20px;
                font-weight: 400;
                color: var(--text);
            }
            .welcome p {
                font-size: 14px;
                max-width: 360px;
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7zm-1 14v-1h2v1h-2zm3.54-4.55l-.54.34V14h-4v-2.21l-.54-.34C7.88 10.58 7 9.86 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 .86-.88 1.58-1.46 1.45z"
                        />
                    </svg>
                </div>
                <div>
                    <div class="logo-name">ವೈದ್ಯ · Vaidya</div>
                    <div class="logo-sub">AI Health Assistant in Kannada</div>
                </div>
            </div>
            <button class="config-btn" onclick="openConfig()">
                ⚙ Settings
            </button>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🩺</div>
                <h2>Namaskara! ನಮಸ್ಕಾರ</h2>
                <p>
                    Ask Vaidya about your health concerns. Responses will be in
                    Kannada. Type below or use the microphone.
                </p>
            </div>
        </div>

        <div class="bottom">
            <div class="input-row">
                <button
                    class="action-btn mic-btn"
                    id="micBtn"
                    title="Hold to speak"
                    onclick="toggleRecording()"
                >
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08C16.39 17.43 19 14.53 19 11h-2z"
                        />
                    </svg>
                </button>
                <textarea
                    id="textInput"
                    rows="1"
                    placeholder="ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ · Type your health question..."
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button
                    class="action-btn send-btn"
                    id="sendBtn"
                    onclick="sendMessage()"
                    title="Send"
                >
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
            <div class="status-bar">
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText"
                        >Configure backend URL in Settings</span
                    >
                </div>
                <label class="tts-toggle" title="Read AI responses aloud">
                    <input type="checkbox" id="ttsToggle" checked />
                    <span>Read aloud</span>
                </label>
            </div>
        </div>

        <!-- Config Modal -->
        <div class="modal-overlay" id="configModal">
            <div class="modal">
                <h2>Settings</h2>
                <div class="field">
                    <label>Backend URL (your ngrok or localhost)</label>
                    <input
                        type="text"
                        id="cfgUrl"
                        placeholder="http://localhost:8000"
                    />
                </div>
                <div class="field">
                    <label>TTS Voice</label>
                    <select id="cfgVoice"></select>
                </div>
                <div class="field">
                    <label>TTS Speed</label>
                    <input
                        type="range"
                        id="cfgSpeed"
                        min="0.5"
                        max="2"
                        step="0.1"
                        value="1"
                        style="padding: 0"
                    />
                </div>
                <div class="modal-btns">
                    <button class="btn-cancel" onclick="closeConfig()">
                        Cancel
                    </button>
                    <button class="btn-save" onclick="saveConfig()">
                        Save
                    </button>
                </div>
            </div>
        </div>

        <script>
            const STORAGE_KEY = "vaidya_config";
            let config = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            config.url = config.url || "";
            config.voice = config.voice || "";
            config.speed = config.speed || 1;

            let history = [];
            let isRecording = false;
            let mediaRecorder = null;
            let audioChunks = [];
            let ttsUtterance = null;

            const chatArea = document.getElementById("chatArea");
            const statusDot = document.getElementById("statusDot");
            const statusText = document.getElementById("statusText");

            function setStatus(state, msg) {
                statusDot.className = "status-dot " + (state || "");
                statusText.textContent = msg;
            }

            function openConfig() {
                document.getElementById("cfgUrl").value = config.url;
                document.getElementById("cfgSpeed").value = config.speed;
                populateVoices();
                document.getElementById("configModal").classList.add("open");
            }

            function closeConfig() {
                document.getElementById("configModal").classList.remove("open");
            }

            function saveConfig() {
                config.url = document
                    .getElementById("cfgUrl")
                    .value.trim()
                    .replace(/\/$/, "");
                config.voice = document.getElementById("cfgVoice").value;
                config.speed = parseFloat(
                    document.getElementById("cfgSpeed").value,
                );
                localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
                closeConfig();
                checkConnection();
            }

            function populateVoices() {
                const sel = document.getElementById("cfgVoice");
                sel.innerHTML = "";
                const voices = speechSynthesis.getVoices();
                voices.forEach((v) => {
                    const opt = document.createElement("option");
                    opt.value = v.name;
                    opt.textContent = `${v.name} (${v.lang})`;
                    if (v.name === config.voice) opt.selected = true;
                    sel.appendChild(opt);
                });
                if (!voices.length) {
                    sel.innerHTML = "<option>Loading voices...</option>";
                    speechSynthesis.onvoiceschanged = populateVoices;
                }
            }

            async function checkConnection() {
                if (!config.url) {
                    setStatus("", "Configure backend URL in Settings");
                    return;
                }
                setStatus("", "Checking connection...");
                try {
                    const r = await fetch(config.url + "/", {
                        signal: AbortSignal.timeout(4000),
                    });
                    const d = await r.json();
                    if (d.status === "ok")
                        setStatus("connected", "Connected to " + config.url);
                    else setStatus("error", "Unexpected response from backend");
                } catch (e) {
                    setStatus(
                        "error",
                        "Cannot reach backend. Check URL & that FastAPI is running.",
                    );
                }
            }

            function hideWelcome() {
                const w = document.getElementById("welcome");
                if (w) w.remove();
            }

            function addMsg(role, content, isStreaming) {
                hideWelcome();
                const wrap = document.createElement("div");
                wrap.className = "msg " + role;
                const av = document.createElement("div");
                av.className =
                    "avatar " + (role === "assistant" ? "ai" : "user-av");
                av.textContent = role === "assistant" ? "ವ" : "U";
                const bubble = document.createElement("div");
                bubble.className = "bubble";
                if (isStreaming) {
                    bubble.innerHTML =
                        '<div class="typing-dots"><span></span><span></span><span></span></div>';
                } else {
                    bubble.textContent = content;
                }
                wrap.appendChild(av);
                wrap.appendChild(bubble);
                chatArea.appendChild(wrap);
                chatArea.scrollTop = chatArea.scrollHeight;
                return bubble;
            }

            function speak(text) {
                if (!document.getElementById("ttsToggle").checked) return;
                if (ttsUtterance) speechSynthesis.cancel();
                ttsUtterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const chosen = voices.find((v) => v.name === config.voice);
                if (chosen) ttsUtterance.voice = chosen;
                ttsUtterance.rate = config.speed || 1;
                speechSynthesis.speak(ttsUtterance);
            }

            async function sendMessage(userText) {
                const input = document.getElementById("textInput");
                const txt = (userText || input.value).trim();
                if (!txt) return;
                if (!config.url) {
                    openConfig();
                    return;
                }

                input.value = "";
                input.style.height = "auto";
                document.getElementById("sendBtn").disabled = true;

                addMsg("user", txt);
                history.push({ role: "user", content: txt });

                const bubble = addMsg("assistant", "", true);
                setStatus("connected", "Vaidya is thinking...");

                try {
                    const res = await fetch(config.url + "/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ messages: history }),
                    });

                    if (!res.ok) throw new Error("HTTP " + res.status);

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = "";
                    bubble.innerHTML = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split("\n");
                        for (const line of lines) {
                            if (!line.startsWith("data: ")) continue;
                            const data = line.slice(6).trim();
                            if (data === "[DONE]") break;
                            try {
                                const parsed = JSON.parse(data);
                                const delta =
                                    parsed.choices?.[0]?.delta?.content;
                                if (delta) {
                                    fullText += delta;
                                    bubble.textContent = fullText;
                                    chatArea.scrollTop = chatArea.scrollHeight;
                                }
                            } catch (_) {}
                        }
                    }

                    history.push({ role: "assistant", content: fullText });
                    speak(fullText);
                    setStatus("connected", "Connected to " + config.url);
                } catch (e) {
                    bubble.textContent = "⚠ Error: " + e.message;
                    bubble.style.color = "#e85c5c";
                    setStatus("error", "Request failed — " + e.message);
                }

                document.getElementById("sendBtn").disabled = false;
            }

            function handleKey(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            }

            function autoResize(el) {
                el.style.height = "auto";
                el.style.height = Math.min(el.scrollHeight, 120) + "px";
            }

            async function toggleRecording() {
                if (isRecording) {
                    mediaRecorder.stop();
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                    });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (e) =>
                        audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        document
                            .getElementById("micBtn")
                            .classList.remove("recording");
                        isRecording = false;
                        setStatus("connected", "Transcribing...");
                        const blob = new Blob(audioChunks, {
                            type: "audio/webm",
                        });
                        const text = await transcribeAudio(blob);
                        stream.getTracks().forEach((t) => t.stop());
                        if (text) {
                            document.getElementById("textInput").value = text;
                            sendMessage(text);
                        } else {
                            setStatus("error", "Could not transcribe audio");
                        }
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    document
                        .getElementById("micBtn")
                        .classList.add("recording");
                    setStatus("", "Recording... tap mic to stop");
                } catch (e) {
                    setStatus("error", "Microphone access denied");
                }
            }

            async function transcribeAudio(blob) {
                try {
                    const recognition = new (
                        window.SpeechRecognition ||
                        window.webkitSpeechRecognition
                    )();
                    recognition.lang = "kn-IN";
                    recognition.interimResults = false;
                    return await new Promise((res, rej) => {
                        recognition.onresult = (e) =>
                            res(e.results[0][0].transcript);
                        recognition.onerror = () => {
                            recognition.lang = "en-IN";
                            recognition.start();
                        };
                        recognition.onend = () => res(null);
                        recognition.start();
                    });
                } catch (_) {
                    return useBlobForSpeechRecognition(blob);
                }
            }

            async function useBlobForSpeechRecognition(blob) {
                return new Promise((resolve) => {
                    const recognition = new (
                        window.SpeechRecognition ||
                        window.webkitSpeechRecognition
                    )();
                    recognition.lang = "kn-IN";
                    recognition.onresult = (e) =>
                        resolve(e.results[0][0].transcript);
                    recognition.onerror = () => resolve(null);
                    recognition.onend = () => resolve(null);
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);
                    audio.play();
                    recognition.start();
                });
            }

            window.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeConfig();
            });

            document
                .getElementById("configModal")
                .addEventListener("click", (e) => {
                    if (e.target === document.getElementById("configModal"))
                        closeConfig();
                });

            speechSynthesis.onvoiceschanged = () => {};

            if (config.url) checkConnection();
            else setStatus("", "Configure backend URL in Settings");
        </script>
    </body>
</html>
